services:
  - type: web
    name: audibuddy-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ADMIN_MODE
        value: "false"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: GOOGLE_GEMINI_API_KEYS
        sync: false
      - key: ELEVENLABS_API_KEYS
        sync: false
      - key: EDGE_TTS_VOICE
        value: "en-US-AriaNeural"
      - key: TTS_PROVIDER_ORDER
        value: "elevenlabs,edge"
      - key: LLM_PROVIDER_ORDER
        value: "gemini"
